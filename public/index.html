<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Canvas Studio</title>
  <link rel="stylesheet" href="/styles.css?v=202607067">
</head>
<body>
  <div id="app">
    <aside class="rail">
      <button class="rail-item active" data-tab="assets" title="资产">
        <span>▣</span>
        <em>资产</em>
      </button>
      <button class="rail-item" data-tab="history" title="历史">
        <span>◷</span>
        <em>历史</em>
      </button>
      <button id="settingsToggle" class="rail-item" title="设置">
        <span>⚙</span>
        <em>设置</em>
      </button>
    </aside>

    <aside class="leftbar">
      <section class="side-tab active" data-panel="assets">
        <div class="asset-tabs">
          <button class="active" data-asset-filter="all">全部</button>
          <button data-asset-filter="person">人物</button>
          <button data-asset-filter="scene">场景</button>
          <button data-asset-filter="object">物品</button>
          <button data-asset-filter="style">风格</button>
          <button data-asset-filter="other">其他</button>
        </div>
        <div id="assetList" class="asset-list"></div>
      </section>

      <section class="side-tab" data-panel="history">
        <div class="mini-title">历史</div>
        <div id="historyList" class="history-list"></div>
      </section>

      <div class="hint">右键画布可添加节点、上传素材。拖拽空白处移动画布，滚轮缩放。</div>
    </aside>

    <main class="stage-wrap">
      <div class="topbar">
        <div class="segmented">
          <button class="active" data-mode="t2i">项目管理</button>
          <button data-mode="i2i">本地素材</button>
          <button data-mode="t2v">提示词预设</button>
          <button data-mode="i2v">爆款克隆</button>
        </div>
        <div class="designer-balance">
          <span class="designer-info">设计师：王黎光 VX 13679166735</span>
          <span class="balance-pill image-balance">生图余额 <b id="imageBalance">¥ --</b></span>
          <span class="balance-pill video-balance">视频余额 <b id="videoBalance">¥ --</b></span>
        </div>
        <div class="status" id="status">就绪</div>
        <div class="top-actions">
          <button id="gridSettingsToggle" type="button" title="网格与连线设置">网格</button>
          <button data-action="fit">显示全部</button>
          <button data-action="save">保存画布</button>
          <button data-action="clear">清空画布</button>
        </div>
      </div>
      <div id="gridSettingsPanel" class="grid-settings-panel hidden">
        <label>网格间距 <input id="gridSpacing" type="range" min="8" max="40" value="20"><b id="gridSpacingValue">20 px</b></label>
        <label>网格点 <input id="gridDot" type="range" min="1" max="6" value="1"><b id="gridDotValue">1 px</b></label>
        <label>连线粗细 <input id="linkWidth" type="range" min="1" max="8" value="3"><b id="linkWidthValue">3 px</b></label>
      </div>
      <div id="stage" class="stage">
        <div id="projectBoard" class="project-board hidden"></div>
        <div id="materialBoard" class="material-board hidden"></div>
        <button id="projectTitleBar" class="project-title-bar" type="button" title="点击重命名项目"></button>
        <svg id="links" class="links"></svg>
        <div id="world" class="world"></div>
        <div id="selectionBox" class="selection-box hidden"></div>
      </div>
    </main>

    <button id="agentFloat" class="agent-float" type="button" title="打开智能体">
      <i></i>
      <span>Agent</span>
    </button>

    <aside id="agentDock" class="agent-dock hidden">
      <div class="agent-head">
        <div>
          <strong>创作智能体</strong>
          <span>配置大模型，让它帮你拆提示词、做图、跑流程</span>
        </div>
        <button type="button" id="closeAgentDock">×</button>
      </div>
      <div class="agent-config">
        <label>大模型</label>
        <select id="agentModel">
          <option>gpt-4.1</option>
          <option>gpt-4o</option>
          <option>doubao-pro</option>
        </select>
        <label>系统指令</label>
        <textarea id="agentSystemPrompt" placeholder="例如：你是一个视频导演，负责把素材拆成可执行工作流。"></textarea>
      </div>
      <div class="agent-chatbar">
        <div class="agent-upload-strip">
          <button type="button" id="agentUploadButton" title="添加参考图">+</button>
          <div id="agentRefs" class="agent-refs"></div>
        </div>
        <textarea id="agentInput" placeholder="先上传参考图，再用 @ 引用，输入你的想法。"></textarea>
        <div class="agent-command-row">
          <button type="button" class="agent-mode-button">✣ Agent</button>
          <button type="button" class="agent-tool-button">@</button>
          <button type="button" class="agent-tool-button">□</button>
          <select id="agentAskMode">
            <option>Ask</option>
            <option>Auto</option>
            <option>Plan</option>
          </select>
          <button type="button" class="agent-send">↑</button>
        </div>
      </div>
    </aside>

    <section id="settings" class="settings hidden">
      <div class="settings-card">
        <div class="panel-head">
          <h2>接口与模型设置</h2>
          <button id="closeSettings">关闭</button>
        </div>
        <div class="settings-grid">
          <div class="settings-video-ark">
            <h3 class="settings-provider-title">
              <label><input type="radio" name="videoProvider" id="providerArk" value="ark" checked> 火山算力</label>
            </h3>
            <label>ARK_BASE_URL <span class="required">*</span></label>
            <input id="arkBaseUrl" placeholder="https://ark.cn-beijing.volces.com/api/v3">
            <label>ARK_API_KEY <span class="required">*</span></label>
            <input id="arkApiKey" type="password" placeholder="建议用服务器环境变量 ARK_API_KEY">
            <label>ARK_MODEL <span class="required">*</span></label>
            <input id="arkModel" placeholder="doubao-seedance-2-0-260">
          </div>
          <div class="settings-image-standard">
            <h3 class="settings-provider-title">
              <label><input type="radio" name="imageSettingsMode" id="imageModeStandard" value="standard"> 生图模型</label>
            </h3>
            <label>Banana API Key</label>
            <input id="bananaApiKey" type="password">
            <label>Banana 网站</label>
            <input id="bananaWebsite">
            <label>Image2 API Key</label>
            <input id="image2ApiKey" type="password">
            <label>Image2 网站</label>
            <input id="image2Website">
            <label>Image2 实际模型 ID</label>
            <input id="image2ModelName" placeholder="gpt-image-2">
            <label>生图模型名</label>
            <input id="imageModels">
          </div>
          <div class="settings-i2i">
            <h3 class="settings-provider-title">
              <label><input type="radio" name="imageSettingsMode" id="imageModeI2i" value="i2i"> 图生图模型</label>
            </h3>
            <p class="settings-note settings-note-right">留空后自行填写</p>
            <label>图生图 API 地址</label>
            <input id="i2iBaseUrl" placeholder="https://www.dmxapi.cn/v1/images/edits">
            <label>图生图 API Key <span class="required">*</span></label>
            <div class="secret-row">
              <input id="i2iApiKey" type="password">
              <button type="button" data-toggle-secret="#i2iApiKey">显示</button>
            </div>
            <label>图生图模型名 <span class="required">*</span></label>
            <input id="i2iModelName" placeholder="gpt-image-2-ssvip">
            <label>请求格式</label>
            <select id="i2iEndpointType">
              <option value="custom-edits">Multipart 完整参数</option>
            </select>
            <input id="i2iWebsite" class="hidden-field" type="hidden">
            <input id="i2iReferenceField" class="hidden-field" type="hidden" value="image">
            <textarea id="i2iIdentityPrompt" class="hidden-field" rows="1"></textarea>
          </div>
          <div class="settings-multimodal">
            <h3 class="settings-provider-title">
              <label>多参模块</label>
            </h3>
            <p class="settings-note settings-note-right">DMXAPI 多模态参考生视频</p>
            <label>API 地址</label>
            <input id="multiBaseUrl" placeholder="https://www.dmxapi.cn/v1/responses">
            <label>API Key</label>
            <div class="secret-row">
              <input id="multiApiKey" type="password">
              <button type="button" data-toggle-secret="#multiApiKey">显示</button>
            </div>
            <label>提交模型</label>
            <input id="multiSubmitModel" placeholder="doubao-seedance-2-0-260128">
            <label>查询模型</label>
            <input id="multiQueryModel" placeholder="seedance-2-0-get">
            <label>请求格式</label>
            <select id="multiRequestFormat">
              <option value="responses-json">Responses JSON 多模态</option>
            </select>
            <div class="compact-grid">
              <div>
                <label>分辨率</label>
                <select id="multiResolution">
                  <option>4K</option>
                </select>
              </div>
              <div>
                <label>比例</label>
                <select id="multiRatio">
                  <option>16:9</option>
                  <option>9:16</option>
                  <option>1:1</option>
                  <option>4:3</option>
                  <option>3:4</option>
                  <option>21:9</option>
                  <option>adaptive</option>
                </select>
              </div>
              <div>
                <label>时长</label>
                <select id="multiDuration">
                  <option value="8">8 秒</option>
                  <option value="9">9 秒</option>
                  <option value="10">10 秒</option>
                  <option value="11">11 秒</option>
                  <option value="12">12 秒</option>
                  <option value="13">13 秒</option>
                  <option value="14">14 秒</option>
                  <option value="15">15 秒</option>
                </select>
              </div>
            </div>
            <div class="settings-checks">
              <label><input id="multiWatermark" type="checkbox"> 水印</label>
              <label><input id="multiReturnLastFrame" type="checkbox"> 返回尾帧</label>
              <label><input id="multiWebSearch" type="checkbox"> 联网搜索</label>
            </div>
          </div>
        </div>
        <button id="saveSettings" class="primary">保存设置</button>
      </div>
    </section>

    <div id="menu" class="context-menu hidden">
      <div class="menu-title" id="menuTitle">添加节点</div>
      <button data-menu="text">文本</button>
      <button data-menu="upload">上传</button>
      <div class="sep"></div>
      <button data-menu="t2i">文生图节点</button>
      <button data-menu="i2i">图生图节点</button>
      <button data-menu="t2v">文生视频</button>
      <button data-menu="i2v">图生视频</button>
      <button data-menu="director">导演台</button>
      <button data-menu="compare">对比节点</button>
      <div class="sep image-node-menu"></div>
      <button class="image-node-menu" data-menu="add-asset">加入资产</button>
      <div class="sep"></div>
      <button data-menu="arrange">整理节点</button>
      <div class="sep selected-menu"></div>
      <button class="selected-menu" data-menu="group">打组</button>
    </div>

    <section id="assetDialog" class="asset-dialog hidden">
      <div class="asset-dialog-card">
        <button class="asset-dialog-close" data-close-asset-dialog>×</button>
        <div class="asset-dialog-tabs">
          <strong>创建资产</strong>
        </div>
        <div class="asset-dialog-body">
          <div>
            <label>封面 <span class="required">*</span></label>
            <div id="assetDialogPreview" class="asset-dialog-preview"></div>
          </div>
          <div>
            <label>名称 <span class="required">*</span></label>
            <input id="assetName" placeholder="我的资产">
            <label>分类 <span class="required">*</span></label>
            <select id="assetCategory">
              <option value="person">人物</option>
              <option value="scene">场景</option>
              <option value="object">物品</option>
              <option value="style">风格</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>
        <div class="asset-dialog-actions">
          <button data-close-asset-dialog>取消</button>
          <button class="primary" data-confirm-asset>创建</button>
        </div>
      </div>
    </section>

    <section id="directorStage" class="director-stage hidden">
      <header class="director-stage-head">
        <strong>3D导演台</strong>
        <div class="director-view-tabs">
          <button class="active">导演视角</button>
          <button>机位视角</button>
        </div>
        <div class="director-stage-actions">
          <button type="button" title="帮助">?</button>
          <button type="button" id="closeDirectorStage">×</button>
        </div>
      </header>
      <aside class="director-left">
        <h3>场景</h3>
        <input placeholder="请输入搜索内容">
        <button class="active">▣ 机位1</button>
        <button>♙ 角色A</button>
      </aside>
      <main class="director-viewport">
        <div class="director-axis-widget"><i></i><b></b><em></em><span></span><button>重置视角</button></div>
        <div class="director-3d-world">
          <div class="director-3d-grid"></div>
          <div class="director-camera-frame"></div>
          <div class="director-avatar">
            <strong>角色A</strong>
            <i></i>
            <span></span>
            <b class="axis-x"></b>
            <b class="axis-y"></b>
            <b class="axis-z"></b>
          </div>
        </div>
        <div class="director-toolbar">
          <button>⌁</button><button>♙</button><button>视</button><button>▣</button><button>⌗</button><button>▤</button><button>↗</button><button class="active">▱</button><button>⟳</button>
        </div>
      </main>
      <aside class="director-right">
        <h3>角色</h3>
        <div class="director-tabs"><button class="active">属性</button><button>姿势</button></div>
        <label>名称<input value="角色A"></label>
        <label>位置</label>
        <div class="director-triplet"><input value="X 0"><input value="Y 0"><input value="Z 0"></div>
        <label>旋转</label>
        <div class="director-triplet"><input value="X 0"><input value="Y 0"><input value="Z 0"></div>
        <label>缩放</label>
        <div class="director-triplet"><input value="X 1.03"><input value="Y 1.03"><input value="Z 1.03"></div>
        <label>统一缩放</label>
        <input type="range" value="1" min=".2" max="2" step=".01">
        <label>颜色</label>
        <div class="director-color"><i></i><input value="#4F8EF7"></div>
      </aside>
    </section>

    <input id="fileInput" type="file" multiple accept="image/*,video/*,audio/*" hidden>
    <input id="imageInput" type="file" multiple accept="image/*" hidden>
    <input id="videoInput" type="file" multiple accept="video/*" hidden>
    <input id="audioInput" type="file" multiple accept="audio/*" hidden>
    <input id="agentRefInput" type="file" multiple accept="image/*" hidden>
  </div>
  <script src="/app.js?v=202607067"></script>
</body>
</html>
